name: release

on:
  release:
    types: [created]

jobs:
  upload-assets:
    name: Build and Upload Assets
    if: startsWith(github.event.release.name, 'heos-control-v')
    environment: release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          package: heos-control
          bin: heos-control
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}